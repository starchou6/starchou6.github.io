baseURL = "https://starchou6.github.io/"
languageCode = "en-us"
title = "ZJ's Tech Blog"
theme = "PaperMod"
paginate = 5

[params]
  author = "Zhou Jing"
  description = "Software Engineer | C# / .NET / AWS | Auckland-bound 🇳🇿"
  ShowReadingTime = true
  ShowShareButtons = true
  ShowCodeCopyButtons = true
  ShowBreadCrumbs = true
  ShowWordCount = true
  ShowPostNavLinks = true
  ShowToc = true
  TocOpen = false
  defaultTheme = "auto"

  [params.homeInfoParams]
    Title = "Zhou Jing — Software Engineer"
    Content = """
📍 Tokyo, Japan &nbsp;|&nbsp; 🇳🇿 Auckland-bound

---

**Current Role**
Software Engineer & Technical Lead · MicroWorld Co., Ltd. (Feb 2025 – Present)

**Education**
M.Eng. Electronic Information Engineering · University of Electronic Science and Technology of China (2021)

**Tech Stack**
C# / .NET · Oracle · AWS · Azure · Docker · Kubernetes · GitHub Actions

**Certifications**
🏅 AWS Certified DevOps Engineer – Professional

**Languages**
Chinese (Native) · Japanese (Business) · English (TOEIC 835)

---

This blog is where I share practical experience with .NET, AWS, and cloud engineering.
"""

  [[params.socialIcons]]
    name = "github"
    url = "https://github.com/starchou6"

  [[params.socialIcons]]
    name = "linkedin"
    url = "https://linkedin.com/in/YOUR_LINKEDIN_ID"

  [[params.socialIcons]]
    name = "rss"
    url = "/index.xml"

[[menu.main]]
  identifier = "posts"
  name = "Posts"
  url = "/posts/"
  weight = 10

[[menu.main]]
  identifier = "tags"
  name = "Tags"
  url = "/tags/"
  weight = 20

[[menu.main]]
  identifier = "about"
  name = "About"
  url = "/about/"
  weight = 30

[markup]
  [markup.highlight]
    noClasses = false
    codeFences = true
    guessSyntax = true
    style = "dracula"
  [markup.goldmark.renderer]
    unsafe = true

[outputs]
  home = ["HTML", "RSS", "JSON"]
