baseURL = "https://starchou6.github.io/"
languageCode = "en-us"
title = "Zhou Jing's Tech Blog"
theme = "PaperMod"
paginate = 5

[params]
  author = "Zhou Jing"
  description = "Software Engineer | C# / .NET / AWS | Tokyo, Japan"
  ShowReadingTime = true
  ShowShareButtons = true
  ShowCodeCopyButtons = true
  ShowBreadCrumbs = true
  ShowWordCount = true
  ShowPostNavLinks = true
  ShowToc = true
  TocOpen = false
  defaultTheme = "auto"

  [params.homeInfoParams]
    Title = "Zhou Jing — Software Engineer"
    Content = "📍 Tokyo, Japan\n\n---\n\n**Current Role**\n\nSoftware Engineer & Technical Lead · MicroWorld Co., Ltd. (Feb 2025 – Present)\n\n**Education**\n\nM.Eng. Electronic Information Engineering · University of Electronic Science and Technology of China (2021)\n\n**Tech Stack**\n\nC# / .NET · Oracle · AWS · Azure · Docker · Kubernetes · GitHub Actions\n\n**Certifications**\n\nAWS Certified DevOps Engineer – Professional\n\n**Languages**\n\nChinese (Native) · Japanese (Business) · English (TOEIC 835)\n\n---\n\nThis blog is where I share practical experience with .NET, AWS, and cloud engineering."

  [[params.socialIcons]]
    name = "github"
    url = "https://github.com/starchou6"

  [[params.socialIcons]]
    name = "linkedin"
    url = "https://linkedin.com/in/YOUR_LINKEDIN_ID"

  [[params.socialIcons]]
    name = "rss"
    url = "/index.xml"

[[menu.main]]
  identifier = "posts"
  name = "Posts"
  url = "/posts/"
  weight = 10

[[menu.main]]
  identifier = "tags"
  name = "Tags"
  url = "/tags/"
  weight = 20

[[menu.main]]
  identifier = "about"
  name = "About"
  url = "/about/"
  weight = 30

[markup]
  [markup.highlight]
    noClasses = false
    codeFences = true
    guessSyntax = true
    style = "dracula"
  [markup.goldmark.renderer]
    unsafe = true

[outputs]
  home = ["HTML", "RSS", "JSON"]
